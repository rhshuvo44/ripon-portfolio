<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1011"/>
      <stop offset="100%" stop-color="#1a1e1f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39f78c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#10e070" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="rad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#10e070" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10e070" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#rad)"/>

  <!-- grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="800" x2="800" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1000"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="600" y1="0" x2="600" y2="1000"/>
  </g>

  <!-- abstract figure: geometric silhouette -->
  <g transform="translate(400,560)">
    <!-- head -->
    <circle cx="0" cy="-220" r="110" fill="#262b2c" stroke="url(#glow)" stroke-width="2.5"/>
    <!-- shoulders/body -->
    <path d="M -210 260 C -210 60 -130 -60 0 -60 C 130 -60 210 60 210 260 Z" fill="#1a1e1f" stroke="url(#glow)" stroke-width="2.5"/>
    <!-- collar line -->
    <path d="M -70 -55 L 0 40 L 70 -55" fill="none" stroke="#39f78c" stroke-width="2" stroke-opacity="0.6"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#39f78c" stroke-width="2" stroke-opacity="0.5" fill="none">
    <path d="M 40 40 L 40 90 M 40 40 L 90 40"/>
    <path d="M 760 40 L 760 90 M 760 40 L 710 40"/>
    <path d="M 40 960 L 40 910 M 40 960 L 90 960"/>
    <path d="M 760 960 L 760 910 M 760 960 L 710 960"/>
  </g>

  <text x="400" y="940" font-family="monospace" font-size="20" fill="#39f78c" fill-opacity="0.7" text-anchor="middle" letter-spacing="3">AM // 2026</text>
</svg>
